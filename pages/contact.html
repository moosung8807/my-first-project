<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Rebalancing Helper 문의 페이지입니다. 사이트 관련 문의를 위한 연락처 정보를 제공합니다."
  />
  <title>Contact</title>
  <script>
    (function () {
      var theme = localStorage.getItem("rb-theme") || "dark";
      document.documentElement.setAttribute("data-theme", theme === "light" ? "light" : "dark");
    })();
  </script>

  <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #111827;
      --muted: #4b5563;
      --line: #d7dbe4;
      --accent: #1f6feb;
      --accent-soft: #eaf2ff;
    }

    html[data-theme="dark"] {
      --bg: #0b0b0f;
      --panel: #11131a;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --line: #24262d;
      --accent: #c9a24d;
      --accent-soft: #1a1920;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px 18px 84px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      line-height: 1.72;
    }
    .shell { max-width: 920px; margin: 0 auto; }
    .docNav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .backLink {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 12px;
      background: var(--panel);
    }
    .backLink:hover { text-decoration: underline; }
    .docMeta {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    main {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px 18px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 33px;
      line-height: 1.25;
      letter-spacing: -0.01em;
    }
    p { margin: 0 0 14px; }
    .highlight {
      background: var(--accent-soft);
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }
    .contactMail {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.01em;
    }
    .contactMail a {
      color: var(--accent);
      text-decoration: none;
    }
    .contactMail a:hover { text-decoration: underline; }
    .docFooter {
      margin-top: 16px;
      color: var(--muted);
      font-size: 14px;
      text-align: right;
    }
    .docFooter a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }
    .docFooter a:hover { text-decoration: underline; }

    @media (max-width: 768px) {
      body { padding: 18px 14px 78px; }
      .docNav { flex-wrap: wrap; align-items: flex-start; }
      .docMeta { white-space: normal; }
      h1 { font-size: 29px; }
      p { font-size: 17px; }
      .contactMail { font-size: 19px; }
      main { padding: 16px 14px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="docNav">
      <a class="backLink" href="../index.html">메인으로 돌아가기</a>
      <div class="docMeta">Rebalancing Helper 문의</div>
    </header>

    <main>
      <h1>Contact</h1>

      <p class="highlight">
        사이트 관련 문의는 아래 이메일로 연락해 주세요.
      </p>

      <p class="contactMail">
        <a href="mailto:derive@kakao.com">derive@kakao.com</a>
      </p>
    </main>

    <footer class="docFooter">
      <a href="../index.html">메인 화면으로 이동</a>
    </footer>
  </div>
</body>
</html>
