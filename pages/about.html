<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Rebalancing Helper 소개 페이지입니다. 개인 투자자를 위한 포트폴리오 리밸런싱 계산 도구의 목적과 범위를 안내합니다."
  />
  <title>About</title>
  <script>
    (function () {
      var theme = localStorage.getItem("rb-theme") || "dark";
      document.documentElement.setAttribute("data-theme", theme === "light" ? "light" : "dark");
    })();
  </script>

  <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #111827;
      --muted: #4b5563;
      --line: #d7dbe4;
      --accent: #1f6feb;
      --accent-soft: #eaf2ff;
    }

    html[data-theme="dark"] {
      --bg: #0b0b0f;
      --panel: #11131a;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --line: #24262d;
      --accent: #c9a24d;
      --accent-soft: #1a1920;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px 18px 84px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      line-height: 1.72;
    }
    .shell { max-width: 920px; margin: 0 auto; }
    .docNav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .backLink {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 12px;
      background: var(--panel);
    }
    .backLink:hover { text-decoration: underline; }
    .docMeta {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    main {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px 18px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 33px;
      line-height: 1.25;
      letter-spacing: -0.01em;
    }
    p { margin: 0 0 14px; }
    .highlight {
      background: var(--accent-soft);
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }
    .docFooter {
      margin-top: 16px;
      color: var(--muted);
      font-size: 14px;
      text-align: right;
    }
    .docFooter a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }
    .docFooter a:hover { text-decoration: underline; }

    @media (max-width: 768px) {
      body { padding: 18px 14px 78px; }
      .docNav { flex-wrap: wrap; align-items: flex-start; }
      .docMeta { white-space: normal; }
      h1 { font-size: 29px; }
      p { font-size: 17px; }
      main { padding: 16px 14px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="docNav">
      <a class="backLink" href="../index.html">메인으로 돌아가기</a>
      <div class="docMeta">Rebalancing Helper 소개</div>
    </header>

    <main>
      <h1>About</h1>

      <p class="highlight">
        본 사이트는 개인 투자자를 위한 포트폴리오 리밸런싱 계산 도구입니다.
      </p>

      <p>
        사용자는 자산별 목표 비중과 현재 보유 현황을 입력하여,
        포트폴리오 조정 방향을 간편하게 확인할 수 있습니다.
      </p>

      <p>
        이 도구는 투자 판단을 직접적으로 권유하거나 금융 상품의 매수·매도를 유도하지 않으며,
        참고용 계산 결과만 제공합니다.
      </p>

      <p>
        모든 계산은 사용자의 브라우저 환경에서만 처리되며,
        서버에 어떠한 투자 정보도 저장되지 않습니다.
      </p>
    </main>

    <footer class="docFooter">
      <a href="../index.html">메인 화면으로 이동</a>
    </footer>
  </div>
</body>
</html>
