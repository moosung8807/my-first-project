<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Rebalancing Helper 소개 페이지입니다. 개인 투자자를 위한 포트폴리오 리밸런싱 계산 도구의 목적과 범위를 안내합니다."
  />
  <title>About</title>
</head>
<body>
  <h1>About</h1>

  <p>
    본 사이트는 개인 투자자를 위한 포트폴리오 리밸런싱 계산 도구를 제공합니다.
    사용자는 자산별 목표 비중과 현재 보유 현황을 입력하여,
    포트폴리오 조정 방향을 간편하게 확인할 수 있습니다.
  </p>

  <p>
    이 도구는 투자 판단을 직접적으로 권유하거나
    금융 상품의 매수·매도를 유도하지 않으며,
    참고용 계산 결과만을 제공합니다.
  </p>

  <p>
    모든 계산은 사용자의 브라우저 환경에서만 처리되며,
    서버에 어떠한 투자 정보도 저장되지 않습니다.
  </p>
</body>
</html>
